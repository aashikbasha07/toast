<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 4 Toast Example</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h3>Bootstrap 4 Toast Example</h3>

    <!-- Button to trigger toast -->
    <button id="showToastBtn" class="btn btn-primary mb-3">
      Show Toast
    </button>

    <!-- Toast container -->
    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true"
         data-delay="3000">
      <div class="toast-header">
        <strong class="mr-auto">Notification</strong>
        <small class="text-muted">Just now</small>
        <button type="button" class="ml-2 mb-1 close" data-dismiss="toast">
          &times;
        </button>
      </div>
      <div class="toast-body">
        This is a Bootstrap 4 toast message.
      </div>
    </div>

  </div>

  <!-- Required JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

  <!-- JavaScript to show toast -->
  <script>
    $(document).ready(function(){
      // Show toast when button is clicked
      $('#showToastBtn').click(function(){
        $('.toast').toast('show');
      });
    });
  </script>

</body>
</html>
